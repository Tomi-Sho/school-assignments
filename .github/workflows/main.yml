name: 毎日天気を通知する

on:
  schedule:
    # 毎日日本時間の朝6時（世界標準時の前日22時）に自動実行する設定
    - cron: '0 21 * * *'
  # （手動テスト用）
  workflow_dispatch:

jobs:
  run-python:
    runs-on: ubuntu-latest
    steps:
      - name: コードをチェックアウト（取得）
        uses: actions/checkout@v4

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なライブラリのインストール
        run: |
          pip install line-bot-sdk requests

      - name: Pythonプログラムを実行
        # GitHubのSecretsからLINEの鍵を安全に読み込む
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
        run: python weather_line_bot/weather_line.py
